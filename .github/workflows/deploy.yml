name: Deploy Laravel Backend

on:
  push:
    branches:
      - master # Ubah ke 'master' jika branch utama Anda bernama master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Pindah ke direktori proyek (UBAH SESUAI REPOSITORY)
            cd /var/www/html/solher-backend

            # 2. Tarik update terbaru
            git pull

            # 3. Update library PHP
            composer install --no-interaction --prefer-dist --optimize-autoloader

            # 4. Bersihkan dan buat ulang cache konfigurasi
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Opsional: Jika ingin otomatis menjalankan migrasi database, hilangkan tanda pagar di bawah
            # php artisan migrate --force
